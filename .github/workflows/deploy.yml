name: Deploy

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

      # Deploy to the Chronicle prod compose stack on the production VPS.
      # The stack lives at /opt/ovp/ and is supervised by systemd via
      # chronicle-data-api.service (which despite the name brings up the
      # whole compose stack: postgres, data-api, collector).
      #
      # Canonical compose file lives in sessionhelper-hub/infra/prod-compose.yml.
      # Fetched fresh on every deploy to avoid drift between the hub source
      # of truth and the running VPS state.
      #
      # Pulling the new collector image and restarting the service is enough;
      # the systemd unit's ExecStart runs `docker compose up -d` which
      # re-creates any containers whose images changed.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            curl -fsSL \
              https://raw.githubusercontent.com/sessionhelper/sessionhelper-hub/main/infra/prod-compose.yml \
              -o /opt/ovp/docker-compose.yml.new
            mv /opt/ovp/docker-compose.yml.new /opt/ovp/docker-compose.yml
            cd /opt/ovp
            docker compose pull collector
            systemctl restart chronicle-data-api
            docker image prune -f

name: Build & Deploy

# Image tag semantics:
#   :sha-<short>        — every push
#   :branch-<sanitized> — pushes to main or refactor/** (for targeted dev smoke)
#   :dev, :latest, :v*  — only on version-tag pushes (the "canonical release")
#
# Prod SSH deploy runs ONLY on version tags. Branch pushes never touch prod.

on:
  push:
    branches: [main, 'refactor/**']
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}"
          SHORT="${GITHUB_SHA::7}"
          TAGS="$IMAGE:sha-$SHORT"
          if [[ "$GITHUB_REF" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            SANITIZED="$(echo "$BRANCH" | tr '/' '-')"
            TAGS="$TAGS,$IMAGE:branch-$SANITIZED"
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$IMAGE:dev,$IMAGE:latest,$IMAGE:$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}

  deploy-prod:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            curl -fsSL \
              https://raw.githubusercontent.com/sessionhelper/sessionhelper-hub/main/infra/prod-compose.yml \
              -o /opt/ovp/docker-compose.yml.new
            mv /opt/ovp/docker-compose.yml.new /opt/ovp/docker-compose.yml
            cd /opt/ovp
            docker compose pull collector
            systemctl restart chronicle-data-api
            docker image prune -f

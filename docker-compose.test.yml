services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ttrpg_test
      POSTGRES_USER: ttrpg
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    tmpfs:
      - /data

[package]
name = "ttrpg-collector"
version = "0.1.0"
edition = "2024"

[lib]
name = "ttrpg_collector"
path = "src/lib.rs"

[[bin]]
name = "ttrpg-collector"
path = "src/main.rs"

[dependencies]
# Discord
serenity = { version = "0.12", default-features = false, features = [
    "gateway", "voice", "rustls_backend", "model", "cache"
] }
songbird = { git = "https://github.com/serenity-rs/songbird.git", branch = "next", features = [
    "receive", "driver"
] }

# Audio codec support for Songbird file playback
symphonia = { version = "0.5", features = ["wav", "pcm", "ogg", "vorbis"] }

# Async
tokio = { version = "1", features = ["full"] }

# Config + CLI
clap = { version = "4", features = ["derive", "env"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Crypto (pseudonymization)
sha2 = "0.10"
hex = "0.4"

# S3 upload
aws-sdk-s3 = "1"
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-credential-types = "1"

# Logging + telemetry
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", optional = true }

# TLS
rustls = { version = "0.23", features = ["ring"] }

# Utils
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
dashmap = "6"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono", "migrate"] }

[features]
prometheus = ["dep:metrics-exporter-prometheus"]

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
serde_json = "1"
walkdir = "2"
